<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>POS Pro - Enterprise Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* === Reset & Variables === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0F1117; --surface: #1A1D27; --card: #242736; --card2: #2E3247;
  --accent: #6C63FF; --accent2: #8B85FF;
  --success: #22C55E; --warning: #F59E0B; --danger: #EF4444; --info: #38BDF8;
  --text: #F0F0F5; --muted: #8B8D9B; --border: #2E3247;
  --r: 14px; --rs: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 16px; /* prevent iOS zoom */
  -webkit-text-size-adjust: 100%;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}
button { cursor: pointer; border: none; outline: none; font-family: inherit; touch-action: manipulation; }
input, select { font-family: inherit; outline: none; border: none; touch-action: manipulation; }
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.mono { font-family: 'JetBrains Mono', monospace; }

/* === App Shell === */
.app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  padding-top: var(--safe-top);
}

/* === Bottom Nav (Mobile) === */
.bottom-nav {
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
  z-index: 50;
}
.bnav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 10px 4px; gap: 3px; background: none; color: var(--muted);
  font-size: 10px; font-weight: 500; min-height: 56px; transition: color .15s;
  position: relative;
}
.bnav-btn.active { color: var(--accent); }
.bnav-btn .icon { font-size: 22px; line-height: 1; }
.bnav-badge {
  position: absolute; top: 6px; right: calc(50% - 20px);
  background: var(--danger); color: #fff; font-size: 9px; font-weight: 700;
  padding: 1px 5px; border-radius: 8px; min-width: 16px; text-align: center;
}

/* === Views === */
.view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.view.active { display: flex; }

/* === Top Bar === */
.topbar {
  display: flex; align-items: center; padding: 12px 16px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
  gap: 10px;
}
.topbar-title { font-size: 17px; font-weight: 700; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.clock { font-family: 'JetBrains Mono'; font-size: 13px; color: var(--muted); }

/* === POS View === */
#view-pos { background: var(--bg); }

/* Search Row */
.search-row { display: flex; gap: 10px; padding: 12px 16px; flex-shrink: 0; }
.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; height: 48px; background: var(--card);
  border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 0 14px 0 44px; color: var(--text); font-size: 16px;
  transition: border-color .15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; pointer-events: none; }
.scan-btn {
  height: 48px; width: 56px; background: var(--accent); color: #fff;
  border-radius: var(--r); font-size: 22px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
}
.scan-btn:active { background: var(--accent2); transform: scale(.95); }

/* Categories */
.cat-row { display: flex; gap: 8px; padding: 0 16px 10px; overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.cat-row::-webkit-scrollbar { display: none; }
.cat-chip {
  padding: 8px 16px; border-radius: 20px; background: var(--card);
  color: var(--muted); font-size: 14px; font-weight: 500; white-space: nowrap;
  border: 1.5px solid transparent; transition: all .15s; min-height: 36px;
}
.cat-chip.active { background: rgba(108,99,255,.15); color: var(--accent); border-color: var(--accent); }

/* Product Grid */
.product-scroll { flex: 1; overflow-y: auto; padding: 0 12px; -webkit-overflow-scrolling: touch; }
.product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 12px; }
.prod-card {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 12px 10px;
  display: flex; flex-direction: column; align-items: flex-start;
  transition: border-color .1s, transform .1s;
  min-height: 100px; position: relative;
}
.prod-card:active { transform: scale(.96); border-color: var(--accent); }
.prod-card.out { opacity: .45; pointer-events: none; }
.prod-card.low .prod-stock { color: var(--warning); }
.prod-emoji { font-size: 26px; margin-bottom: 6px; }
.prod-name { font-size: 12px; font-weight: 500; line-height: 1.3; margin-bottom: 4px; }
.prod-price { font-family: 'JetBrains Mono'; font-size: 13px; color: var(--accent); font-weight: 600; }
.prod-stock { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* qty badge บนการ์ด */
.prod-card.in-cart { border-color: var(--accent); background: rgba(108,99,255,.08); }
.cart-badge {
  position: absolute; top: 6px; right: 6px;
  display: flex; align-items: center; gap: 3px;
  background: var(--accent); border-radius: 20px;
  padding: 2px 4px; z-index: 10;
}
.cbadge-btn {
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,255,255,.2); color: #fff;
  font-size: 16px; font-weight: 700; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  border: none; cursor: pointer; touch-action: manipulation;
  flex-shrink: 0;
}
.cbadge-btn:active { background: rgba(255,255,255,.4); }
.cbadge-n {
  font-family: 'JetBrains Mono'; font-size: 13px;
  font-weight: 700; color: #fff; min-width: 16px; text-align: center;
}

/* Cart Panel — slides up on mobile */
.cart-panel {
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
  max-height: 52vh; transition: max-height .25s ease;
}
.cart-panel.collapsed { max-height: 60px; }
.cart-panel.collapsed .cart-body { display: none; }
.cart-panel.collapsed .cart-footer { display: none; }

.cart-handle {
  display: flex; align-items: center; padding: 12px 16px; gap: 10px;
  min-height: 56px; cursor: pointer; flex-shrink: 0; user-select: none;
}
.cart-handle-title { font-size: 15px; font-weight: 600; }
.cart-count-pill {
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
}
.cart-total-preview { margin-left: auto; font-family: 'JetBrains Mono'; font-size: 15px; font-weight: 700; color: var(--accent); }
.cart-toggle-icon { font-size: 18px; color: var(--muted); transition: transform .25s; }
.cart-panel:not(.collapsed) .cart-toggle-icon { transform: rotate(180deg); }
.clear-btn { background: none; color: var(--danger); font-size: 13px; font-weight: 500; padding: 4px 8px; }

.cart-body { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
.cart-empty { display: flex; flex-direction: column; align-items: center; padding: 20px; gap: 4px; color: var(--muted); font-size: 13px; }

.cart-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
}
.ci-emoji { font-size: 22px; flex-shrink: 0; }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ci-price { font-size: 12px; color: var(--muted); }
.qty-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.qty-btn {
  width: 32px; height: 32px; border-radius: 8px; background: var(--card2);
  color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center;
  transition: background .1s; min-height: 32px;
}
.qty-btn:active { background: var(--accent); }
.qty-n { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 600; min-width: 22px; text-align: center; }
.ci-total { font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 600; color: var(--accent); min-width: 56px; text-align: right; }

/* Cart Footer */
.cart-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
.disc-row { display: flex; gap: 8px; margin-bottom: 10px; }
.disc-row input {
  flex: 1; height: 44px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--rs); padding: 0 12px; color: var(--text); font-size: 16px;
}
.disc-row select {
  height: 44px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--rs); padding: 0 10px; color: var(--text); font-size: 14px;
}
.summary-rows { margin-bottom: 12px; }
.sum-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 2px 0; }
.sum-row.grand { font-size: 20px; font-weight: 700; color: var(--text); padding-top: 6px; }
.sum-row.grand .mono { color: var(--accent); }
.pay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.pay-btn {
  height: 52px; border-radius: var(--r); font-size: 15px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s; min-height: 52px;
}
.pay-btn:active { opacity: .8; transform: scale(.98); }
.pay-btn:disabled { opacity: .35; pointer-events: none; }
.pay-cash { background: var(--success); color: #fff; }
.pay-qr { background: var(--accent); color: #fff; grid-column: span 2; height: 56px; font-size: 16px; }
.pay-receipt { background: var(--card2); color: var(--text); }

/* === Products View === */
#view-products { background: var(--bg); }
.prod-mgmt-scroll { flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
.toolbar { display: flex; gap: 10px; margin-bottom: 12px; }
.toolbar input {
  flex: 1; height: 48px; background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--r); padding: 0 14px; color: var(--text); font-size: 16px;
}
.add-btn {
  height: 48px; padding: 0 16px; background: var(--accent); color: #fff;
  border-radius: var(--r); font-size: 14px; font-weight: 600; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.prod-table-list { display: flex; flex-direction: column; gap: 8px; }
.prod-row {
  background: var(--card); border-radius: var(--r); padding: 14px;
  display: flex; align-items: center; gap: 12px; border: 1px solid var(--border);
}
.pr-emoji { font-size: 28px; flex-shrink: 0; }
.pr-info { flex: 1; min-width: 0; }
.pr-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.pr-meta { font-size: 12px; color: var(--muted); }
.pr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.pr-price { font-family: 'JetBrains Mono'; font-size: 15px; font-weight: 700; color: var(--accent); }
.stock-pill { padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.s-ok { background: rgba(34,197,94,.15); color: var(--success); }
.s-low { background: rgba(245,158,11,.15); color: var(--warning); }
.s-out { background: rgba(239,68,68,.15); color: var(--danger); }
.pr-actions { display: flex; gap: 6px; margin-top: 4px; }
.pr-btn { height: 32px; padding: 0 12px; border-radius: var(--rs); font-size: 12px; font-weight: 600; min-height: 32px; }
.pr-edit { background: var(--card2); color: var(--text); }
.pr-del { background: rgba(239,68,68,.1); color: var(--danger); }

/* === History View === */
#view-history { background: var(--bg); }
.hist-scroll { flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
.hist-card {
  background: var(--card); border-radius: var(--r); padding: 14px;
  display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
  border: 1px solid var(--border); cursor: pointer;
}
.hist-card:active { background: var(--card2); }
.hist-left { flex: 1; min-width: 0; }
.hist-id { font-size: 11px; color: var(--muted); margin-bottom: 2px; font-family: 'JetBrains Mono'; }
.hist-desc { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
.hist-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.hist-total { font-family: 'JetBrains Mono'; font-size: 16px; font-weight: 700; color: var(--success); }
.meth-pill { font-size: 11px; padding: 2px 8px; border-radius: 8px; }
.meth-cash { background: rgba(34,197,94,.15); color: var(--success); }
.meth-qr { background: rgba(108,99,255,.15); color: var(--accent); }

/* === Dashboard View === */
#view-dashboard { background: var(--bg); }
.dash-scroll { flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--card); border-radius: var(--r); padding: 16px; border: 1px solid var(--border); }
.stat-lbl { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.stat-val { font-family: 'JetBrains Mono'; font-size: 24px; font-weight: 700; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
.section-hd { font-size: 15px; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.bar-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-lbl { font-size: 12px; color: var(--muted); width: 40px; text-align: right; flex-shrink: 0; }
.bar-bg { flex: 1; height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .6s ease; }
.bar-v { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--muted); width: 52px; text-align: right; flex-shrink: 0; }

/* === Modals === */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200;
  display: flex; align-items: flex-end; /* bottom sheet on mobile */
  opacity: 0; pointer-events: none; transition: opacity .2s;
  backdrop-filter: blur(4px);
}
.overlay.open { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--surface); border-radius: 20px 20px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 0 calc(20px + var(--safe-bottom));
  transform: translateY(20px); transition: transform .25s;
}
.overlay.open .sheet { transform: translateY(0); }
.sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 16px; }
.sheet-title { font-size: 18px; font-weight: 700; padding: 0 20px 4px; }
.sheet-sub { font-size: 13px; color: var(--muted); padding: 0 20px 16px; }
.sheet-divider { height: 1px; background: var(--border); margin: 0 20px 16px; }
.sheet-btns { display: flex; gap: 10px; padding: 0 20px; }
.sbtn { flex: 1; height: 52px; border-radius: var(--r); font-size: 15px; font-weight: 600; min-height: 52px; transition: opacity .15s; }
.sbtn:active { opacity: .8; }
.sbtn-primary { background: var(--success); color: #fff; }
.sbtn-secondary { background: var(--card2); color: var(--text); }
.sbtn-accent { background: var(--accent); color: #fff; }

/* QR Sheet */
.qr-box {
  width: 200px; height: 200px; background: #fff; border-radius: 16px;
  margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; padding: 10px;
}
.qr-amount { font-family: 'JetBrains Mono'; font-size: 32px; font-weight: 700; color: var(--accent); text-align: center; margin-bottom: 6px; }
.qr-hint { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 16px; padding: 0 20px; }

/* Cash Sheet */
.cash-due { font-size: 13px; color: var(--muted); padding: 0 20px 12px; }
.cash-disp { margin: 0 20px 8px; background: var(--card); border-radius: var(--r); padding: 14px 16px; }
.cash-disp label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
.cash-amount { font-family: 'JetBrains Mono'; font-size: 32px; font-weight: 700; }
.change-row { text-align: center; font-family: 'JetBrains Mono'; font-size: 16px; font-weight: 700; color: var(--success); min-height: 28px; margin-bottom: 8px; }
.keypad { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 0 20px 10px; }
.key { height: 56px; border-radius: var(--r); background: var(--card); color: var(--text); font-size: 20px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: background .1s; min-height: 44px; }
.key:active { background: var(--card2); }
.presets { display: flex; gap: 6px; padding: 0 20px 14px; overflow-x: auto; scrollbar-width: none; }
.presets::-webkit-scrollbar { display: none; }
.preset-btn { height: 40px; padding: 0 14px; background: var(--card2); color: var(--text); border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; min-height: 40px; }
.preset-btn:active { background: var(--card); }

/* Product Form Sheet */
.form-body { padding: 0 20px; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 13px; color: var(--muted); font-weight: 500; margin-bottom: 6px; }
.fg input, .fg select {
  width: 100%; height: 48px; background: var(--card);
  border: 1.5px solid var(--border); border-radius: var(--r);
  padding: 0 14px; color: var(--text); font-size: 16px; transition: border-color .15s;
}
.fg input:focus, .fg select:focus { border-color: var(--accent); }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Receipt Sheet */
.receipt-body { padding: 0 20px; font-family: 'JetBrains Mono'; font-size: 13px; line-height: 1.9; }
.receipt-header { text-align: center; margin-bottom: 12px; }
.receipt-header .store { font-size: 16px; font-weight: 700; font-family: 'Inter'; }
.receipt-dashed { border-top: 1px dashed var(--border); margin: 8px 0; }
.receipt-row { display: flex; justify-content: space-between; }
.receipt-grand { font-size: 18px; font-weight: 700; }
.receipt-footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 8px; }

/* Toast */
.toast-box { position: fixed; top: calc(16px + var(--safe-top)); right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 6px; pointer-events: none; max-width: calc(100vw - 32px); }
.toast {
  background: var(--card2); border-radius: var(--r); padding: 12px 16px;
  font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px;
  transform: translateX(110%); transition: transform .25s; pointer-events: none;
  border-left: 3px solid var(--muted); box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.toast.show { transform: translateX(0); }
.toast.s { border-left-color: var(--success); }
.toast.e { border-left-color: var(--danger); }
.toast.i { border-left-color: var(--info); }

/* Scanning animation */
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(108,99,255,.5)} 60%{box-shadow:0 0 0 10px rgba(108,99,255,0)} }
.scanning { animation: pulse 1s ease infinite; }

/* Desktop enhancement */
@media (min-width: 768px) {
  .bottom-nav { display: none; }
  .app { flex-direction: row; }
  .side-nav {
    width: 72px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 16px 0; gap: 4px; flex-shrink: 0;
  }
  .snav-btn {
    width: 56px; height: 56px; border-radius: var(--r); background: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; color: var(--muted); font-size: 10px; font-weight: 500; transition: all .15s;
  }
  .snav-btn .icon { font-size: 24px; }
  .snav-btn.active { background: rgba(108,99,255,.15); color: var(--accent); }
  .views-area { flex: 1; overflow: hidden; display: flex; }
  .view { display: none; }
  .view.active { display: flex; }
}
@media (min-width: 1024px) {
  .side-nav { width: 200px; align-items: flex-start; padding: 20px 12px; }
  .snav-btn { width: 100%; height: 48px; flex-direction: row; justify-content: flex-start; padding: 0 16px; gap: 12px; font-size: 14px; border-radius: var(--rs); }
  .snav-btn .icon { font-size: 20px; }
  #view-pos { flex-direction: row; }
  .pos-left { flex: 1; overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
  .pos-right { width: 380px; display: flex; flex-direction: column; }
  .cart-panel { max-height: none !important; flex: 1; display: flex; flex-direction: column; border-top: none; }
  .cart-panel.collapsed { max-height: none; }
  .cart-panel.collapsed .cart-body { display: flex; }
  .cart-panel.collapsed .cart-footer { display: block; }
  .cart-toggle-icon, .cart-handle { cursor: default; }
  .cart-handle { border-bottom: 1px solid var(--border); }
}
@media print {
  body > *:not(#printArea) { display: none !important; }
  #printArea { display: block !important; font-family: 'Courier New'; font-size: 12px; padding: 10px; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Side Nav (desktop only) -->

            <div class="sum-row grand"><span>ยอดรวม</span><span class="mono" id="sumTotal">฿0.00</span></div>
          </div>
          <div class="pay-row">

    </div>

    <!-- === Products View === -->
    <div class="view" id="view-products">

  <!-- Bottom Nav (mobile) -->

    <button class="bnav-btn" data-view="dashboard"><span class="icon">📊</span>รายงาน</button>

</div>

<!-- QR Bottom Sheet -->

<!-- Product Form Sheet -->
<div class="overlay" id="prodSheet">
  <div class="sheet">

    <div class="sheet-title" id="prodSheetTitle">➕ เพิ่มสินค้า</div>
    <div class="sheet-divider"></div>
    <div class="form-body">
      <div class="fg"><label>ชื่อสินค้า *</label><input id="fName" type="text" placeholder="เช่น น้ำดื่ม 600ml"></div>
      <div class="fg-row">
        <div class="fg"><label>ราคา (฿) *</label><input id="fPrice" type="number" inputmode="decimal" min="0" placeholder="0"></div>
        <div class="fg"><label>คงเหลือ</label><input id="fStock" type="number" inputmode="numeric" min="0" placeholder="0"></div>

      <button class="sbtn sbtn-secondary" onclick="closeSheet('receiptSheet')">ปิด</button>
      <button class="sbtn sbtn-accent" onclick="printReceipt()">🖨️ พิมพ์ / บันทึก</button>

    <div style="height:8px"></div>
  </div>
</div>

<div class="toast-box" id="toastBox"></div>
<div id="printArea" style="display:none"></div>

<script>
// ── Config ──
const STORE = 'POS Pro ร้านค้า';
const LOW = 5;

// ── Default State ──
let defaultProds = [
  {id:1,name:'น้ำดื่ม 600ml',price:7,stock:48,cat:'เครื่องดื่ม',emoji:'💧',barcode:'8850001234567',alert:5},
  {id:2,name:'โค้ก 325ml',price:15,stock:24,cat:'เครื่องดื่ม',emoji:'🥤',barcode:'8850009876543',alert:5},
  {id:3,name:'กาแฟสำเร็จรูป',price:8,stock:3,cat:'เครื่องดื่ม',emoji:'☕',barcode:'8850001111111',alert:5},
  {id:4,name:'ข้าวเหนียวหมูย่าง',price:40,stock:12,cat:'อาหาร',emoji:'🍱',barcode:'123456',alert:3},
  {id:5,name:'บะหมี่กึ่งสำเร็จรูป',price:6,stock:0,cat:'อาหาร',emoji:'🍜',barcode:'8850002222222',alert:5},
  {id:6,name:'ขนมปัง',price:35,stock:8,cat:'อาหาร',emoji:'🍞',barcode:'112233',alert:3},
];

let prods = [];
let txns = [];
let cart = [], nid = 13, editId = null, activeCat = 'ทั้งหมด', cashStr = '0';

// ── LocalStorage Data Engine ──
function loadData() {
  const localProds = localStorage.getItem('pos_prods');
  const localTxns = localStorage.getItem('pos_txns');
  
  if (localProds) {
    prods = JSON.parse(localProds);
  } else {
    prods = [...defaultProds];
    saveData();
  }
  
  if (localTxns) {
    txns = JSON.parse(localTxns);
  }
  
  if (prods.length > 0) {
    nid = Math.max(...prods.map(p => p.id)) + 1;
  }
}

function saveData() {
  localStorage.setItem('pos_prods', JSON.stringify(prods));
  localStorage.setItem('pos_txns', JSON.stringify(txns));
}

// ── Hardware Barcode Scanner Engine (Global Listener) ──
let barcodeBuffer = '';
let lastKeyTime = Date.now();

document.addEventListener('keydown', e => {
  // หากผู้ใช้กำลังพิมพ์ใน input ใดๆ อยู่ ไม่ต้องดักจับเพื่อยิงสินค้า
  if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;

  const currentTime = Date.now();
  // เครื่องยิงบาร์โค้ดจะส่งค่าถี่มาก (ปกติ < 30ms ต่อตัวอักษร) ถ้าคีย์บอร์ดมนุษย์กดจะช้ากว่านั้น
  if (currentTime - lastKeyTime > 100) {
    barcodeBuffer = '';
  }
  lastKeyTime = currentTime;

  if (e.key === 'Enter') {
    if (barcodeBuffer.length >= 3) { 
      const scannedProd = prods.find(p => p.barcode === barcodeBuffer);
      if (scannedProd) {
        addToCart(scannedProd.id);
        toast(`🎯 ยิงบาร์โค้ดสำเร็จ: ${scannedProd.name}`, 's');
        // บนมือถือ ให้กางตะกร้าอัตโนมัติเพื่อให้เห็นว่าของเข้าแล้ว
        if (window.innerWidth < 1024) {
          document.getElementById('cartPanel').classList.remove('collapsed');
        }
      } else {
        toast(`⚠ ไม่พบสินค้าบาร์โค้ด: ${barcodeBuffer}`, 'e');
      }
      barcodeBuffer = '';
    }
  } else if (/^[a-zA-Z0-9]$/.test(e.key)) {
    barcodeBuffer += e.key;
  }
});

// ── Helpers ──
const fmt = n => '฿' + Number(n).toLocaleString('th-TH',{minimumFractionDigits:2});
const fmtN = n => Number(n).toLocaleString('th-TH');
function getTotals() {
  const sub = cart.reduce((s,i) => s + i.price*i.qty, 0);
  const dv = parseFloat(document.getElementById('discV').value)||0;
  const dt = document.getElementById('discT').value;
  const disc = Math.min(dt==='pct' ? sub*dv/100 : dv, sub);
  return {sub, disc, total: Math.max(sub-disc,0)};
}

// ── Toast ──
function toast(msg, type='i') {
  const b = document.getElementById('toastBox');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg;
  b.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2500);
}

// ── View navigation ──
function goView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.bnav-btn, .snav-btn').forEach(b => b.classList.toggle('active', b.dataset.view===v));
  if (v==='dashboard') renderDash();
  if (v==='products') renderProdTable();
  if (v==='history') renderHist();
}
document.querySelectorAll('.bnav-btn, .snav-btn').forEach(b => b.addEventListener('click', ()=>goView(b.dataset.view)));

// ── Responsive nav ──
function updateNav() {
  const desktop = window.innerWidth >= 768;
  document.getElementById('bottomNav').style.display = desktop ? 'none' : 'flex';
  document.getElementById('sideNav').style.display = desktop ? 'flex' : 'none';
}
window.addEventListener('resize', updateNav);

// ── Categories ──
function getCats() { return ['ทั้งหมด', ...new Set(prods.map(p=>p.cat))]; }
function renderCats() {
  document.getElementById('catRow').innerHTML = getCats().map(c =>
    `<button class="cat-chip${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(c) { activeCat=c; renderCats(); renderProds(); }

// ── Product Grid ──
function filterProds() { renderProds(); }
function renderProds() {
  const q = document.getElementById('srch').value.toLowerCase();
  let list = prods;
  if (activeCat!=='ทั้งหมด') list = list.filter(p=>p.cat===activeCat);
  if (q) list = list.filter(p=>p.name.toLowerCase().includes(q)||p.barcode.includes(q));
  const g = document.getElementById('prodGrid');
  if (!list.length) { g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--muted)">ไม่พบสินค้า</div>'; return; }
  g.innerHTML = list.map(p => {
    const out = p.stock===0, low = p.stock>0&&p.stock<=p.alert;
    const ci = cart.find(x=>x.id===p.id);
    const inCart = ci ? ci.qty : 0;
    return `<div class="prod-card${out?' out':''}${low?' low':''}${inCart?' in-cart':''}" onclick="addToCart(${p.id})">
      ${inCart ? `<div class="cart-badge">
        <button class="cbadge-btn" onclick="event.stopPropagation();changeQty(${p.id},-1)">−</button>
        <span class="cbadge-n">${inCart}</span>
        <button class="cbadge-btn" onclick="event.stopPropagation();addToCart(${p.id})">+</button>
      </div>` : ''}
      <span class="prod-emoji">${p.emoji}</span>
      <div class="prod-name">${p.name}</div>
      <div class="prod-price">${fmt(p.price)}</div>
      <div class="prod-stock">${out?'หมด':low?`⚠ เหลือ ${p.stock}`:`เหลือ ${p.stock}`}</div>
    </div>`;
  }).join('');
}

// ── Cart ──
function addToCart(id) {
  const p = prods.find(x=>x.id===id);
  if (!p||p.stock===0) { toast('สินค้าหมดคลังแล้ว','e'); return; }
  const ex = cart.find(x=>x.id===id);
  if (ex) {
    if (ex.qty>=p.stock) { toast('สินค้าในคลังไม่พอขาย','e'); return; }
    ex.qty++;
  } else { cart.push({id,name:p.name,price:p.price,emoji:p.emoji,qty:1}); }
  renderCart();
  renderProds();
}

function changeQty(id,d) {
  const i = cart.find(x=>x.id===id);
  if (!i) return;
  const p = prods.find(x=>x.id===id);
  if (d > 0 && i.qty >= p.stock) { toast('สินค้าในคลังไม่พอขาย','e'); return; }
  i.qty += d;
  if (i.qty<=0) { cart=cart.filter(x=>x.id!==id); }
  renderCart();
  renderProds();
}

function clearCart() { cart=[]; document.getElementById('discV').value=''; renderCart(); renderProds(); }

function toggleCart() {
  if (window.innerWidth >= 1024) return;
  document.getElementById('cartPanel').classList.toggle('collapsed');
}

function renderCart() {
  const total = cart.reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').textContent = total;
  document.getElementById('cartPreview').textContent = fmt(getTotals().total);
  const body = document.getElementById('cartBody');
  const empty = document.getElementById('cartEmpty');
  
  body.querySelectorAll('.cart-item').forEach(el=>el.remove());
  
  if (!cart.length) {
    empty.style.display='flex';
  } else {
    empty.style.display='none';
    cart.forEach(i => {
      const el = document.createElement('div');
      el.className = 'cart-item';
      el.innerHTML = `<span class="ci-emoji">${i.emoji}</span>
        <div class="ci-info"><div class="ci-name">${i.name}</div><div class="ci-price">${fmt(i.price)}/ชิ้น</div></div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
          <span class="qty-n">${i.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
        </div>
        <span class="ci-total">${fmt(i.price*i.qty)}</span>`;
      body.appendChild(el);
    });
  }
  recalc();
}

function recalc() {
  const {sub,disc,total} = getTotals();
  document.getElementById('sumSub').textContent = fmt(sub);
  document.getElementById('sumDisc').textContent = '-'+fmt(disc);
  document.getElementById('sumTotal').textContent = fmt(total);
  const has = cart.length>0;
  ['btnCash','btnQR','btnReceipt'].forEach(id=>document.getElementById(id).disabled=!has);
}

// ── Sheets ──
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

function openQR() {
  const {total} = getTotals();
  document.getElementById('qrAmt').textContent = fmt(total);
  document.getElementById('qrSheet').classList.add('open');
  drawQR(total);
}

function drawQR(amount) {
  const c = document.getElementById('qrCanvas');
  const ctx = c.getContext('2d');
  c.width=180; c.height=180;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,180,180);
  const cells=21, sz=180/cells;
  const corners = [[0,0],[14,0],[0,14]];
  corners.forEach(([ox,oy]) => {
    ctx.fillStyle='#000'; ctx.fillRect(ox*sz,oy*sz,7*sz,7*sz);
    ctx.fillStyle='#fff'; ctx.fillRect((ox+1)*sz,(oy+1)*sz,5*sz,5*sz);
    ctx.fillStyle='#000'; ctx.fillRect((ox+2)*sz,(oy+2)*sz,3*sz,3*sz);
  });
  ctx.fillStyle='#000';
  const seed = Math.floor(amount*100)||1;
  for (let r=0;r<cells;r++) for(let c2=0;c2<cells;c2++) {
    if ((r<8&&c2<8)||(r<8&&c2>12)||(r>12&&c2<8)) continue;
    if (((seed*(r+3)*(c2+7)*31)%97)>46) ctx.fillRect(c2*sz,r*sz,sz,sz);
  }
}

function openCash() {
  const {total}=getTotals();
  cashStr='0';
  document.getElementById('cashDue').textContent=`ยอดที่ต้องชำระ: ${fmt(total)}`;
  document.getElementById('cashAmt').textContent='0';
  document.getElementById('changeRow').textContent='';
  document.getElementById('cashConfirm').disabled=true;
  document.getElementById('cashSheet').classList.add('open');
}

function cKey(k) {
  if (k==='⌫') { cashStr=cashStr.slice(0,-1)||'0'; }
  else { cashStr = cashStr==='0' ? k : cashStr+k; }
  if (cashStr.length>8) cashStr=cashStr.slice(0,8);
  const v=parseInt(cashStr)||0;
  document.getElementById('cashAmt').textContent=fmtN(v);
  const {total}=getTotals();
  const change=v-total;
  const cr=document.getElementById('changeRow');
  if (change>=0) { cr.textContent=`ทอน: ${fmt(change)}`; cr.style.color='var(--success)'; document.getElementById('cashConfirm').disabled=false; }
  else { cr.textContent=`ขาด: ${fmt(-change)}`; cr.style.color='var(--danger)'; document.getElementById('cashConfirm').disabled=true; }
}

function cPreset(n) { cashStr=String((parseInt(cashStr)||0)+n); cKey(''); }

function openReceipt() {
  const {sub,disc,total}=getTotals();
  const now=new Date();
  document.getElementById('receiptBody').innerHTML=`
    <div class="receipt-header"><div class="store">${STORE}</div><div style="font-size:12px;color:var(--muted)">${now.toLocaleString('th-TH')}</div></div>
    <div class="receipt-dashed"></div>
    ${cart.map(i=>`<div class="receipt-row"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
    <div class="receipt-dashed"></div>
    ${disc>0?`<div class="receipt-row" style="color:var(--warning)"><span>ส่วนลด</span><span>-${fmt(disc)}</span></div>`:''}
    <div class="receipt-row receipt-grand"><span>ยอดรวม</span><span style="color:var(--accent)">${fmt(total)}</span></div>
    <div class="receipt-footer">ขอบคุณที่ใช้บริการ 🙏</div>`;
  document.getElementById('receiptSheet').classList.add('open');
}

function confirmPay(method) {
  const {sub,disc,total}=getTotals();
  const change = method==='Cash' ? Math.max((parseInt(cashStr)||0)-total,0) : 0;
  txns.unshift({id:'R'+String(txns.length+1).padStart(4,'0'), date:new Date(), items:[...cart], sub,disc,total,method,change});
  
  // ตัดสต็อก
  cart.forEach(ci=>{const p=prods.find(x=>x.id===ci.id);if(p) p.stock=Math.max(0,p.stock-ci.qty);});
  
  saveData(); // บันทึกข้อมูลลงฐานข้อมูลเบราว์เซอร์
  closeSheet('qrSheet'); closeSheet('cashSheet');
  cart=[]; document.getElementById('discV').value='';
  renderCart(); renderProds(); checkLow();
  toast(`✅ บันทึกยอดขาย ${fmt(total)}${method==='Cash'?` ทอน ${fmt(change)}`:''}`, 's');
}

// ── Scan simulation ──
function doScan() {
  const btn = document.getElementById('scanBtn');
  btn.classList.add('scanning');
  setTimeout(()=>{
    btn.classList.remove('scanning');
    const avail = prods.filter(p=>p.barcode&&p.stock>0);
    if(!avail.length){toast('ไม่มีสินค้าที่มีบาร์โค้ดในระบบ','e');return;}
    const p = avail[Math.floor(Math.random()*avail.length)];
    document.getElementById('srch').value=p.barcode;
    filterProds();
    addToCart(p.id);
    setTimeout(()=>{document.getElementById('srch').value='';renderProds();},900);
  },600);
}

// ── Product Management ──
function renderProdTable() {
  const q=(document.getElementById('pmSrch').value||'').toLowerCase();
  const list=prods.filter(p=>!q||p.name.toLowerCase().includes(q)||p.barcode.includes(q));
  document.getElementById('prodTable').innerHTML=list.map(p=>{
    const sc=p.stock===0?'s-out':p.stock<=p.alert?'s-low':'s-ok';
    const sl=p.stock===0?'หมด':p.stock<=p.alert?`⚠ เหลือ ${p.stock}`:p.stock;
    return `<div class="prod-row">
      <span class="pr-emoji">${p.emoji}</span>
      <div class="pr-info">
        <div class="pr-name">${p.name}</div>
        <div class="pr-meta">${p.cat}${p.barcode?` · 🔑 ${p.barcode}`:''}</div>
        <div class="pr-actions">
          <button class="pr-btn pr-edit" onclick="editProd(${p.id})">✏️ แก้ไข</button>
          <button class="pr-btn pr-del" onclick="delProd(${p.id})">🗑️ ลบ</button>
        </div>
      </div>
      <div class="pr-right">
        <span class="pr-price">${fmt(p.price)}</span>
        <span class="stock-pill ${sc}">${sl}</span>
      </div>
    </div>`;
  }).join('');
}

function openAddProd() {
  editId=null;
  ['fName','fPrice','fStock','fBarcode','fEmoji','fCat','fAlert'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('prodSheetTitle').textContent='➕ เพิ่มสินค้าใหม่';
  document.getElementById('prodSheet').classList.add('open');
}

function editProd(id) {
  const p=prods.find(x=>x.id===id); if(!p) return;
  editId=id;
  document.getElementById('fName').value=p.name;
  document.getElementById('fPrice').value=p.price;
  document.getElementById('fStock').value=p.stock;
  document.getElementById('fBarcode').value=p.barcode;
  document.getElementById('fEmoji').value=p.emoji;
  document.getElementById('fCat').value=p.cat;
  document.getElementById('fAlert').value=p.alert;
  document.getElementById('prodSheetTitle').textContent='✏️ แก้ไขข้อมูลสินค้า';
  document.getElementById('prodSheet').classList.add('open');
}

function saveProd() {
  const name=document.getElementById('fName').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value)||0;
  if(!name||price<0){toast('กรุณากรอกชื่อและราคาให้ถูกต้อง','e');return;}
  const data={name,price,stock:parseInt(document.getElementById('fStock').value)||0,
    barcode:document.getElementById('fBarcode').value.trim(),
    emoji:document.getElementById('fEmoji').value.trim()||'📦',
    cat:document.getElementById('fCat').value.trim()||'ทั่วไป',
    alert:parseInt(document.getElementById('fAlert').value)||5};
  if(editId){Object.assign(prods.find(x=>x.id===editId),data);toast('อัปเดตสินค้าสำเร็จ','s');}
  else {prods.push({id:nid++,...data});toast('เพิ่มสินค้าใหม่สำเร็จ','s');}
  
  saveData();
  closeSheet('prodSheet');
  renderProdTable(); renderCats(); renderProds(); checkLow();
}

function delProd(id) {
  if(!confirm('คุณแน่ใจใช่ไหมที่จะลบสินค้านี้ออกจากระบบ?')) return;
  prods=prods.filter(x=>x.id!==id);
  saveData();
  renderProdTable(); renderCats(); renderProds(); checkLow();
  toast('ลบสินค้าสำเร็จ','i');
}

// ── History ──
function renderHist() {
  const el=document.getElementById('histList');
  if(!txns.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">ยังไม่มีรายการประวัติการขาย</div>';return;}
  el.innerHTML=txns.map(t=>`
    <div class="hist-card" onclick="showTx('${t.id}')">
      <div class="hist-left">
        <div class="hist-id">${t.id}</div>
        <div class="hist-desc">${t.items.map(i=>i.emoji).join('')} ${t.items.map(i=>i.name).join(', ').substring(0,40)}</div>
        <div class="hist-time">${new Date(t.date).toLocaleString('th-TH')}</div>
      </div>
      <div class="hist-right">
        <span class="hist-total">${fmt(t.total)}</span>
        <span class="meth-pill ${t.method==='Cash'?'meth-cash':'meth-qr'}">${t.method==='Cash'?'💵 เงินสด':'📲 QR'}</span>
      </div>
    </div>`).join('');
}

function showTx(id) {
  const t=txns.find(x=>x.id===id); if(!t) return;
  document.getElementById('receiptBody').innerHTML=`
    <div class="receipt-header"><div class="store">${STORE}</div><div style="font-size:12px;color:var(--muted)">${new Date(t.date).toLocaleString('th-TH')}</div><div style="font-size:11px;color:var(--muted)">${t.id} · ${t.method==='Cash'?'เงินสด':'QR'}</div></div>
    <div class="receipt-dashed"></div>
    ${t.items.map(i=>`<div class="receipt-row"><span>${i.emoji} ${i.name} ×${i.qty}</span><span>${fmt(i.price*i.qty)}</span></div>`).join('')}
    <div class="receipt-dashed"></div>
    ${t.disc>0?`<div class="receipt-row" style="color:var(--warning)"><span>ส่วนลด</span><span>-${fmt(t.disc)}</span></div>`:''}
    <div class="receipt-row receipt-grand"><span>ยอดรวม</span><span style="color:var(--accent)">${fmt(t.total)}</span></div>
    ${t.method==='Cash'?`<div class="receipt-row" style="color:var(--success)"><span>ทอน</span><span>${fmt(t.change)}</span></div>`:''}
    <div class="receipt-footer">ขอบคุณที่ใช้บริการ 🙏</div>`;
  document.getElementById('receiptSheet').classList.add('open');
}

  const html = document.getElementById('receiptBody').innerHTML;
  const win = window.open('', '_blank');
  if (!win) { toast('กรุณาอนุญาต Pop-up ของเบราว์เซอร์เพื่อพิมพ์','e'); return; }
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ใบเสร็จรับเงิน</title>
<style>
  body{font-family:'Courier New',monospace;font-size:14px;padding:20px;max-width:320px;margin:auto;background:#fff;color:#000;line-height:1.8}
  .store{font-size:17px;font-weight:bold;text-align:center;margin-bottom:4px}
  hr{border:none;border-top:1px dashed #ccc;margin:10px 0}
  .row{display:flex;justify-content:space-between}

  .footer{text-align:center;font-size:12px;color:#888;margin-top:10px}

<script>window.onload=()=>{window.print();window.close();}<\/script></body></html>`);
  win.document.close();
}

// ── Reset ยอดขาย ──
function resetTxns() {
  if (!confirm('💥 คำเตือน! คุณต้องการล้างข้อมูลยอดขายทั้งหมดใช่ไหม?\nการกระทำนี้จะล้างประวัติถาวรและไม่สามารถกู้คืนได้')) return;
  txns = [];
  saveData();
  renderHist();
  renderDash();
  toast('ล้างประวัติการขายเรียบร้อยแล้ว','i');
}

// ── Export ยอดขายเป็น Excel (CSV) ──
function exportSalesCSV() {
  if (!txns.length) { toast('ไม่มีข้อมูลยอดขายในระบบให้ส่งออก', 'e'); return; }
  let csvContent = "\uFEFF"; // รองรับภาษาไทยใน Excel
  csvContent += "เลขที่ใบเสร็จ,วันที่-เวลา,รายการสินค้า,ยอดรวมสุทธิ,ช่องทางชำระ\n";
  
  txns.forEach(t => {
    let itemStr = t.items.map(i => `${i.name}(x${i.qty})`).join(' | ');
    csvContent += `${t.id},${new Date(t.date).toLocaleString('th-TH')},"${itemStr}",${t.total},${t.method === 'Cash' ? 'เงินสด' : 'QR Code'}\n`;
  });
  
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.setAttribute("download", `รายงานยอดขาย_POS_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('📥 ส่งออกไฟล์รายงาน CSV สำเร็จ', 's');
}

// ── Dashboard ──
function renderDash() {
  const tod=txns.filter(t=>new Date(t.date).toDateString()===new Date().toDateString());
  const todTotal=tod.reduce((s,t)=>s+t.total,0);
  const todItems=tod.reduce((s,t)=>s+t.items.reduce((a,i)=>a+i.qty,0),0);
  const low=prods.filter(p=>p.stock>0&&p.stock<=p.alert).length;
  const out=prods.filter(p=>p.stock===0).length;
  const allTotal=txns.reduce((s,t)=>s+t.total,0);
  document.getElementById('dashStats').innerHTML=[
    {l:'ยอดขายวันนี้',v:fmt(todTotal),s:`${tod.length} รายการ`,c:'var(--success)'},
    {l:'สินค้าขายวันนี้',v:fmtN(todItems),s:'ชิ้น',c:'var(--accent)'},
    {l:'สินค้าใกล้หมด',v:low,s:'รายการ',c:'var(--warning)'},
    {l:'สินค้าหมดคลัง',v:out,s:'รายการ',c:'var(--danger)'},
    {l:'รายได้รวมทั้งหมด',v:fmt(allTotal),s:'ทุกรายการในระบบ',c:'var(--success)'},
    {l:'สินค้าทั้งหมด',v:prods.length,s:'รายการ',c:'var(--info)'},
  ].map(s=>`<div class="stat-card"><div class="stat-lbl">${s.l}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-sub">${s.s}</div></div>`).join('');

  // Hourly bars
  const hMap={};
  tod.forEach(t=>{const h=new Date(t.date).getHours();hMap[h]=(hMap[h]||0)+t.total;});
  const nowH=new Date().getHours();
  const startH=Math.max(nowH-9,6);
  const hrs=Array.from({length:Math.min(nowH-startH+1,10)},(_,i)=>{
    const h=startH+i; return {h:String(h).padStart(2,'0')+':00',v:hMap[h]||0};
  });
  const mx=Math.max(...hrs.map(h=>h.v),1);
  document.getElementById('dashBars').innerHTML = hrs.length
    ? hrs.map(h=>`<div class="bar-row"><span class="bar-lbl">${h.h}</span><div class="bar-bg"><div class="bar-fill" style="width:${(h.v/mx*100).toFixed(1)}%"></div></div><span class="bar-v">${fmt(h.v)}</span></div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0">ยังไม่มีข้อมูลยอดขายในวันนี้</div>';

  // Top products
  const soldMap={};
  txns.forEach(t=>t.items.forEach(i=>{soldMap[i.id]=(soldMap[i.id]||{name:i.name,emoji:i.emoji,qty:0});soldMap[i.id].qty+=i.qty;}));
  const topList=Object.values(soldMap).sort((a,b)=>b.qty-a.qty).slice(0,5);
  const tmx=Math.max(...topList.map(p=>p.qty),1);
  document.getElementById('dashTop').innerHTML = topList.length
    ? topList.map(p=>`<div class="bar-row"><span class="bar-lbl" style="font-size:18px;width:28px">${p.emoji}</span><div class="bar-bg"><div class="bar-fill" style="width:${(p.qty/tmx*100).toFixed(1)}%;background:var(--success)"></div></div><span class="bar-v" style="font-size:11px;color:var(--text)">${p.name.substring(0,10)}</span></div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px 0">ยังไม่มีข้อมูล</div>';
}

// ── Low Stock Badge ──
function checkLow() {
  const n=prods.filter(p=>p.stock<=p.alert).length;
  const pill=document.getElementById('alertPill');
  const badge=document.getElementById('bnBadge');
  pill.style.display=n?'inline':'none';
  pill.textContent=`⚠ ${n}`;
  badge.style.display=n?'inline':'none';
  badge.textContent=n;
}

// ── Clock ──
setInterval(()=>{
  document.getElementById('clk').textContent=new Date().toLocaleTimeString('th-TH');
},1000);

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e=>{
  if (e.key==='/'&&document.activeElement.tagName!=='INPUT') { e.preventDefault(); document.getElementById('srch').focus(); }
  if (e.key==='Escape') { document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open')); }
});

// ── Init ──
loadData();
updateNav();
renderCats();
renderProds();
checkLow();
</script>
